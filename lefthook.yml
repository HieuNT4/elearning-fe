# https://github.com/evilmartians/lefthook

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    lint:
      run: npm run lint
    typecheck:
      run: npm run typecheck

pre-push:
  commands:
    build:
      run: npm run build
